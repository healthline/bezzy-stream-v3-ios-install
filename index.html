<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DEP Stage iOS Install</title>
    <style>
      :root {
        color-scheme: light dark;
        --accent: #0077b6;
        --bg: #f7f9fb;
        --card: #ffffff;
        --muted: #5f6b7a;
        --text: #15202b;
        --border: #d8e0e8;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0c1117;
          --card: #151b23;
          --muted: #9aa7b5;
          --text: #f2f5f8;
          --border: #303946;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        line-height: 1.45;
      }

      main {
        width: min(100%, 720px);
        margin: 0 auto;
        padding: 48px 20px;
      }

      .panel {
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--card);
        padding: 28px;
      }

      .app-header {
        display: flex;
        gap: 18px;
        align-items: center;
      }

      .app-icon {
        width: 72px;
        height: 72px;
        border-radius: 16px;
      }

      h1 {
        margin: 0 0 4px;
        font-size: 2rem;
        letter-spacing: 0;
      }

      .meta {
        margin: 0;
        color: var(--muted);
        font-size: 1rem;
      }

      .install {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 52px;
        margin-top: 28px;
        padding: 0 24px;
        border-radius: 8px;
        background: var(--accent);
        color: white;
        font-size: 1.1rem;
        font-weight: 700;
        text-decoration: none;
      }

      .notes {
        margin: 28px 0 0;
        padding-left: 20px;
        color: var(--muted);
      }

      .notes li + li {
        margin-top: 10px;
      }

      code {
        font-family: "SFMono-Regular", Consolas, monospace;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="panel" aria-labelledby="page-title">
        <div class="app-header">
          <img class="app-icon" src="./display-image.png" alt="" />
          <div>
            <h1 id="page-title">DEP Stage</h1>
            <p class="meta">Version 14.6.1 (900723)</p>
            <p class="meta"><code>com.healthline.dep-stage</code></p>
          </div>
        </div>

        <a
          class="install"
          href="itms-services://?action=download-manifest&url=https://crispy-couscous-5v16wr3.pages.github.io/manifest.plist"
        >
          Install DEP Stage
        </a>

        <ul class="notes">
          <li>Open this page in Safari on an iPhone or iPad.</li>
          <li>First-time enterprise installs require trusting Healthline Networks, Inc. in iOS Settings.</li>
          <li>This build is for authorized internal testing only.</li>
        </ul>
      </section>
    </main>
  </body>
</html>
