<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bezzy Stage Installs</title>
    <style>
      :root {
        color-scheme: light dark;
        --accent: #0077b6;
        --accent-strong: #00649b;
        --android: #1b7f4c;
        --bg: #f7f9fb;
        --card: #ffffff;
        --muted: #5f6b7a;
        --text: #15202b;
        --border: #d8e0e8;
        --soft: #eef4f8;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0c1117;
          --card: #151b23;
          --muted: #9aa7b5;
          --text: #f2f5f8;
          --border: #303946;
          --soft: #1d2631;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        line-height: 1.45;
      }

      main {
        width: min(100%, 920px);
        margin: 0 auto;
        padding: 32px 16px;
        display: grid;
        gap: 24px;
      }

      .panel {
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--card);
        padding: 24px;
      }

      .page-header {
        text-align: center;
        padding: 0 8px;
      }

      .page-header h1 {
        margin: 0 0 6px;
        font-size: clamp(1.6rem, 5vw, 2rem);
      }

      .page-header p {
        margin: 0;
        color: var(--muted);
      }

      .filter {
        width: 100%;
        margin-top: 14px;
        padding: 12px 14px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--card);
        color: var(--text);
        font-size: 1rem;
      }

      .app-header {
        display: flex;
        gap: 16px;
        align-items: center;
      }

      .app-icon {
        width: 72px;
        height: 72px;
        border-radius: 16px;
        flex: 0 0 auto;
      }

      h1 {
        margin: 0 0 4px;
        font-size: clamp(1.75rem, 6vw, 2.25rem);
        letter-spacing: 0;
      }

      h2 {
        margin: 0;
        font-size: 1.25rem;
        letter-spacing: 0;
      }

      .meta {
        margin: 0;
        color: var(--muted);
        font-size: 1rem;
      }

      .build-summary {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 14px;
        margin-top: 22px;
        padding: 18px 0 0;
        border-top: 1px solid var(--border);
      }

      .build-detail {
        display: grid;
        gap: 2px;
      }

      .label {
        color: var(--muted);
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .build-detail strong,
      .build-detail time {
        color: var(--text);
        font-size: 1rem;
        font-weight: 700;
      }

      .platform-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
        margin-top: 24px;
      }

      .platform-card {
        display: flex;
        min-width: 0;
        flex-direction: column;
        gap: 16px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--soft);
        padding: 18px;
      }

      .platform-card.is-recommended {
        border-color: var(--accent);
        box-shadow: 0 0 0 1px var(--accent);
      }

      .platform-heading {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
      }

      .platform-title {
        display: grid;
        gap: 3px;
      }

      .platform-pill {
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 3px 10px;
        color: var(--muted);
        font-size: 0.78rem;
        font-weight: 700;
        white-space: nowrap;
      }

      .recommended-label {
        display: none;
        color: var(--accent);
        font-size: 0.82rem;
        font-weight: 700;
      }

      .platform-card.is-recommended .recommended-label {
        display: block;
      }

      .platform-meta {
        display: grid;
        gap: 8px;
        color: var(--muted);
        font-size: 0.95rem;
      }

      .platform-meta p {
        margin: 0;
      }

      .install {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 52px;
        width: 100%;
        padding: 0 18px;
        border-radius: 8px;
        background: var(--accent);
        color: white;
        font-size: 1.04rem;
        font-weight: 700;
        text-align: center;
        text-decoration: none;
      }

      .install:hover {
        background: var(--accent-strong);
      }

      .install.android {
        background: var(--android);
      }

      .secondary-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .secondary {
        flex: 1 1 150px;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--text);
      }

      .instructions {
        border-top: 1px solid var(--border);
        padding-top: 14px;
      }

      .instructions summary {
        cursor: pointer;
        color: var(--text);
        font-weight: 700;
      }

      .instructions summary::marker {
        color: var(--accent);
      }

      .steps {
        margin: 14px 0 0;
        padding-left: 20px;
      }

      .steps li + li {
        margin-top: 9px;
      }

      .instruction-notes {
        margin-top: 14px;
        color: var(--muted);
      }

      .instruction-notes p {
        margin: 0;
      }

      .instruction-notes p + p {
        margin-top: 8px;
      }

      code {
        font-family: "SFMono-Regular", Consolas, monospace;
      }

      .panel[hidden] {
        display: none;
      }

      @media (max-width: 720px) {
        main {
          padding: 18px 12px;
        }

        .panel {
          padding: 20px;
        }

        .platform-grid {
          grid-template-columns: 1fr;
        }

        .app-icon {
          width: 64px;
          height: 64px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header class="page-header">
        <h1>Bezzy Stage Installs</h1>
        <p>Stage builds for authorized internal testing.</p>
        <input
          id="app-filter"
          class="filter"
          type="search"
          placeholder="Filter apps (e.g. migraine, psoriasis)…"
          aria-label="Filter apps"
        />
      </header>

      <div id="app-list"></div>
    </main>

    <script>
      // Single build timestamp for this rollout.
      const BUILD_UPDATED_AT = "2026-05-29T14:58:04Z";

      // All 10 Bezzy stage apps. scheme:null when the app has no usable
      // custom URL scheme (copd's Info.plist carries a wrong scheme; msbuddy
      // has none) — those omit the "Open app" convenience link.
      const APPS = [
        { id: "dep",     name: "Bezzy Depression",                bundleId: "com.healthline.dep-stage",  version: "14.6.1 (900723)", manifest: "manifest.plist",         apk: "dep-stage.apk",     icon: "display-image.png",         scheme: "dephealthline" },
        { id: "pso",     name: "Bezzy Psoriasis",                 bundleId: "com.healthline.pso-stage",  version: "14.6.1 (900751)", manifest: "pso-manifest.plist",     apk: "pso-stage.apk",     icon: "pso-display-image.png",     scheme: "psohealthline" },
        { id: "bcbuddy", name: "Bezzy Breast Cancer",             bundleId: "com.healthline.bc-stage",   version: "14.6.1 (900719)", manifest: "bcbuddy-manifest.plist", apk: "bcbuddy-stage.apk", icon: "bcbuddy-display-image.png", scheme: "bchealthline" },
        { id: "copd",    name: "Bezzy COPD",                      bundleId: "com.healthline.copd-stage", version: "14.6.1 (626)",    manifest: "copd-manifest.plist",    apk: "copd-stage.apk",    icon: "copd-display-image.png",    scheme: null },
        { id: "ibd",     name: "Bezzy IBD (Crohn's & Colitis)",   bundleId: "com.healthline.ibd-stage",  version: "14.6.1 (900721)", manifest: "ibd-manifest.plist",     apk: "ibd-stage.apk",     icon: "ibd-display-image.png",     scheme: "ibdhealthline" },
        { id: "mig",     name: "Bezzy Migraine",                  bundleId: "com.healthline.mig-stage",  version: "14.6.1 (900730)", manifest: "mig-manifest.plist",     apk: "mig-stage.apk",     icon: "mig-display-image.png",     scheme: "mighealthline" },
        { id: "msbuddy", name: "Bezzy MS: Multiple Sclerosis",    bundleId: "com.healthline.ms-stage",   version: "14.6.1 (900749)", manifest: "msbuddy-manifest.plist", apk: "msbuddy-stage.apk", icon: "msbuddy-display-image.png", scheme: null },
        { id: "psa",     name: "Bezzy Psoriatic Arthritis",       bundleId: "com.healthline.psa-stage",  version: "14.6.1 (900731)", manifest: "psa-manifest.plist",     apk: "psa-stage.apk",     icon: "psa-display-image.png",     scheme: "psahealthline" },
        { id: "ra",      name: "Bezzy RA: Rheumatoid Arthritis",  bundleId: "com.healthline.ra-stage",   version: "14.6.1 (900730)", manifest: "ra-manifest.plist",      apk: "ra-stage.apk",      icon: "ra-display-image.png",      scheme: "rahealthline" },
        { id: "t2d",     name: "Bezzy Type 2 Diabetes",           bundleId: "com.healthline.t2d-stage",  version: "14.6.1 (900720)", manifest: "t2d-manifest.plist",     apk: "t2d-stage.apk",     icon: "t2d-display-image.png",     scheme: "t2dhealthline" },
      ];

      const BASE = "https://bezzy-stream-v3-app-install.netlify.app";

      function esc(s) {
        return String(s).replace(/[&<>"']/g, (c) => ({
          "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",
        }[c]));
      }

      function appPanel(app) {
        const name = esc(app.name);
        const openLink = app.scheme
          ? `<div class="secondary-actions">
               <a class="install secondary" href="${app.scheme}://">Open iOS app</a>
             </div>`
          : "";
        return `
        <section class="panel" data-app="${app.id}" data-name="${esc(app.name.toLowerCase())} ${app.id}">
          <div class="app-header">
            <img class="app-icon" src="./${app.icon}" alt="" />
            <div>
              <h1>${name}</h1>
              <p class="meta">Stage build</p>
              <p class="meta"><code>${esc(app.bundleId)}</code></p>
            </div>
          </div>

          <div class="build-summary" aria-label="Build details">
            <div class="build-detail">
              <span class="label">Environment</span>
              <strong>Stage</strong>
            </div>
            <div class="build-detail">
              <span class="label">Version</span>
              <strong>${esc(app.version)}</strong>
            </div>
          </div>

          <div class="platform-grid" aria-label="Choose a platform">
            <article class="platform-card" data-platform-card="ios">
              <div class="platform-heading">
                <div class="platform-title">
                  <span class="label">iPhone and iPad</span>
                  <h2>Install iOS app</h2>
                  <span class="recommended-label">Recommended for this device</span>
                </div>
                <span class="platform-pill">iOS</span>
              </div>
              <div class="platform-meta">
                <p><strong>Version:</strong> ${esc(app.version)}</p>
                <p><strong>Last update:</strong>
                  <time data-last-updated-at="${BUILD_UPDATED_AT}">${BUILD_UPDATED_AT}</time>
                </p>
              </div>
              <a class="install" href="itms-services://?action=download-manifest&url=${BASE}/${app.manifest}">Install on iOS</a>
              ${openLink}
              <details class="instructions">
                <summary>iOS installation instructions</summary>
                <ol class="steps">
                  <li>Open this page in Safari on an iPhone or iPad.</li>
                  <li>Tap Install on iOS and confirm the install prompt.</li>
                  <li>After it installs, open ${name} from the Home Screen.</li>
                  <li>If iOS says the enterprise developer is untrusted, open Settings.</li>
                  <li>Go to General, then VPN &amp; Device Management.</li>
                  <li>Under Enterprise App, tap Healthline Networks, Inc.</li>
                  <li>Tap Trust Healthline Networks, Inc., then return to ${name}.</li>
                </ol>
                <div class="instruction-notes">
                  <p>The trust step is only needed the first time this enterprise developer is used on a device, and covers every Bezzy app on it.</p>
                  <p>iOS does not allow an OTA-installed app to open automatically.</p>
                </div>
              </details>
            </article>

            <article class="platform-card" data-platform-card="android">
              <div class="platform-heading">
                <div class="platform-title">
                  <span class="label">Android phone</span>
                  <h2>Download Android app</h2>
                  <span class="recommended-label">Recommended for this device</span>
                </div>
                <span class="platform-pill">Android</span>
              </div>
              <div class="platform-meta">
                <p><strong>Build:</strong> Stage APK</p>
                <p><strong>Last update:</strong>
                  <time data-last-updated-at="${BUILD_UPDATED_AT}">${BUILD_UPDATED_AT}</time>
                </p>
              </div>
              <a class="install android" href="./${app.apk}" download>Download Android APK</a>
              <details class="instructions">
                <summary>Android installation instructions</summary>
                <ol class="steps">
                  <li>Open this page in Chrome on an Android device.</li>
                  <li>Tap Download Android APK.</li>
                  <li>Open the downloaded file when Chrome finishes.</li>
                  <li>If Android blocks the install, allow this browser to install unknown apps.</li>
                  <li>Finish the install, then open ${name} from the app launcher.</li>
                </ol>
                <div class="instruction-notes">
                  <p>Android may ask for install permission the first time a browser installs an APK.</p>
                  <p>This build is for authorized internal testing only.</p>
                </div>
              </details>
            </article>
          </div>
        </section>`;
      }

      const numberWords = {
        1: "one", 2: "two", 3: "three", 4: "four", 5: "five", 6: "six",
        7: "seven", 8: "eight", 9: "nine", 10: "ten", 11: "eleven", 12: "twelve",
      };
      const countLabel = (v) => numberWords[v] || String(v);

      function isYesterday(date, now) {
        const y = new Date(now);
        y.setDate(now.getDate() - 1);
        return date.toDateString() === y.toDateString();
      }

      function formatLastUpdated(date, now = new Date()) {
        const elapsed = Math.max(0, now.getTime() - date.getTime());
        const min = 60 * 1000, hr = 60 * min;
        if (elapsed < 45 * 1000) return "just now";
        if (elapsed < 90 * 1000) return "one minute ago";
        if (elapsed < hr) return `${countLabel(Math.round(elapsed / min))} minutes ago`;
        if (elapsed < 90 * min) return "one hour ago";
        if (elapsed < 24 * hr) return `${countLabel(Math.round(elapsed / hr))} hours ago`;
        if (isYesterday(date, now)) return "yesterday";
        return date.toLocaleDateString(undefined, {
          month: "short", day: "numeric",
          year: date.getFullYear() === now.getFullYear() ? undefined : "numeric",
        });
      }

      function renderLastUpdated() {
        document.querySelectorAll("[data-last-updated-at]").forEach((el) => {
          const d = new Date(el.dataset.lastUpdatedAt);
          el.dateTime = d.toISOString();
          el.textContent = formatLastUpdated(d);
          el.title = d.toLocaleString();
        });
      }

      function markRecommendedPlatform() {
        const ua = navigator.userAgent || "";
        const platform = /Android/i.test(ua)
          ? "android"
          : /iPhone|iPad|iPod/i.test(ua) ? "ios" : null;
        if (!platform) return;
        document
          .querySelectorAll(`[data-platform-card="${platform}"]`)
          .forEach((c) => c.classList.add("is-recommended"));
      }

      function applyFilter(q) {
        const term = q.trim().toLowerCase();
        document.querySelectorAll("[data-app]").forEach((panel) => {
          panel.hidden = term !== "" && !panel.dataset.name.includes(term);
        });
      }

      document.getElementById("app-list").innerHTML = APPS.map(appPanel).join("");
      renderLastUpdated();
      markRecommendedPlatform();
      window.setInterval(renderLastUpdated, 30 * 1000);
      document
        .getElementById("app-filter")
        .addEventListener("input", (e) => applyFilter(e.target.value));
    </script>
  </body>
</html>
